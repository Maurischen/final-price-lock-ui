query RunInput {
  cart {
    lines {
      id
      quantity
      attribute(key: "Condition") {
        value
      }
      cost {
        amountPerQuantity {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          sku
        }
      }
    }
  }

  discount {
    metafield(namespace: "$app:bundle-discount", key: "function-configuration") {
      jsonValue
    }
  }
}
query CartInput {
  cart {
    lines {
      id
      quantity
      attribute(key: "Condition") {
        value
      }
      cost {
        amountPerQuantity {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          sku
          product {
            id
          }
        }
      }
    }
  }
  discount {
    metafield(
      namespace: "app--299787976705--standalone-discount"
      key: "function-configuration"
    ) {
      jsonValue
    }
  }
}